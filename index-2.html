<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fire Radio Log Ver.2</title>
<style>
  :root{--bg:#0b0f14;--panel:#121922;--line:#26313d;--text:#e9eef5;--muted:#9aa7b5;--blue:#8fd3ff;--red:#e53935;--green:#2e7d32;--yellow:#ffd45a;}
  *{box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif;background:var(--bg);color:var(--text);margin:0;padding:8px;}
  header{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--line);padding:6px 0 8px;}
  h1{font-size:16px;margin:0 0 6px;font-weight:800;letter-spacing:.02em;}
  .toprow,.btnrow{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin:4px 0;}
  label{font-size:12px;color:var(--muted);}
  input{background:#17202a;color:var(--text);border:1px solid #3a4654;border-radius:6px;padding:6px 8px;font-size:13px;}
  #sessionName{min-width:260px;max-width:520px;flex:1;}
  #search{min-width:180px;flex:1;}
  button{font-size:13px;padding:7px 10px;border:0;border-radius:8px;font-weight:700;color:#fff;cursor:pointer;}
  .start{background:var(--red)} .stop{background:#555}.save{background:#1976d2}.txt{background:#00695c}.clear{background:#777}.copy{background:#6a1b9a}
  #status{font-size:13px;color:var(--yellow);margin-left:4px;}
  #live{font-size:12px;color:#b7e3ff;border:1px solid #31465a;border-radius:8px;padding:5px 8px;margin-top:4px;min-height:24px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .note{font-size:11px;color:var(--muted);margin-top:3px;}
  main{padding-top:4px;}
  .log{display:grid;grid-template-columns:50px 1fr;gap:8px;align-items:start;border-bottom:1px solid #27313b;padding:4px 2px;font-size:14px;line-height:1.25;min-height:28px;}
  .time{color:var(--blue);font-weight:800;font-variant-numeric:tabular-nums;}
  .text{white-space:pre-wrap;word-break:break-word;}
  .empty{color:var(--muted);font-size:14px;padding:16px 4px;}
  @media (min-width:900px){
    body{padding:10px 14px;}
    h1{font-size:18px;}
    .log{font-size:15px;grid-template-columns:56px 1fr;padding:4px 2px;}
  }
</style>
</head>
<body>
<header>
  <h1>Fire Radio Log Ver.2｜消防無線リアルタイムログ</h1>
  <div class="toprow">
    <label for="sessionName">記録名</label>
    <input id="sessionName" placeholder="例：2026-06-25_大田建物火災" oninput="saveState()">
    <span id="status">停止中</span>
  </div>
  <div class="btnrow">
    <button class="start" onclick="startRec()">新規記録開始</button>
    <button class="stop" onclick="stopRec()">停止</button>
    <button class="txt" onclick="downloadText()">テキスト保存</button>
    <button class="save" onclick="downloadCSV()">Excel用保存</button>
    <button class="copy" onclick="copyLogs()">コピー</button>
    <button class="clear" onclick="clearLog()">全消去</button>
    <input id="search" placeholder="検索：現着、救助、CANなど" oninput="renderLogs()">
  </div>
  <div id="live">認識中の文字がここに出ます</div>
  <div class="note">時刻は「分」まで表示。記録名を変更すると、保存時のファイル名に反映されます。</div>
</header>
<main id="logs"></main>
<script>
let recognition=null;
let logs=JSON.parse(localStorage.getItem('fireRadioLogsV2')||'[]');
let sessionName=localStorage.getItem('fireRadioSessionNameV2')||defaultSessionName();
let shouldContinue=false;
let isRecording=false;

document.getElementById('sessionName').value=sessionName;
renderLogs();

function pad(n){return String(n).padStart(2,'0')}
function nowDate(){const d=new Date();return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}
function nowMinute(){const d=new Date();return `${pad(d.getHours())}:${pad(d.getMinutes())}`}
function defaultSessionName(){const d=new Date();return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}_無線ログ`}
function safeFileName(name){return (name||'無線ログ').replace(/[\\/:*?"<>|]/g,'_').replace(/\s+/g,'_')}
function saveState(){
  localStorage.setItem('fireRadioLogsV2',JSON.stringify(logs));
  localStorage.setItem('fireRadioSessionNameV2',document.getElementById('sessionName').value||defaultSessionName());
}
function addLog(text){
  const item={date:nowDate(),time:nowMinute(),text:text};
  logs.push(item);
  saveState();
  renderLogs();
}
function renderLogs(){
  const q=document.getElementById('search').value.trim();
  const box=document.getElementById('logs');
  box.innerHTML='';
  const data=logs.filter(x=>!q || x.text.includes(q) || x.time.includes(q));
  if(data.length===0){box.innerHTML='<div class="empty">ログはまだありません。</div>';return;}
  data.slice().reverse().forEach(row=>{
    const div=document.createElement('div');
    div.className='log';
    const time=document.createElement('div');
    time.className='time';
    time.textContent=row.time;
    const text=document.createElement('div');
    text.className='text';
    text.textContent=row.text;
    div.appendChild(time);div.appendChild(text);box.appendChild(div);
  });
}
function startRec(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('このブラウザは音声認識に対応していません。iPhoneはSafari、Android/PCはChromeで試してください。');return;}
  if(logs.length>0){
    const ok=confirm('新しい記録を開始しますか？\n現在の画面のログは消えます。必要なら先に「テキスト保存」してください。');
    if(!ok)return;
  }
  logs=[];
  document.getElementById('sessionName').value=defaultSessionName();
  saveState();renderLogs();
  shouldContinue=true;isRecording=true;
  startRecognition(SR);
}
function startRecognition(SR){
  recognition=new SR();
  recognition.lang='ja-JP';
  recognition.continuous=true;
  recognition.interimResults=true;
  recognition.onstart=()=>{document.getElementById('status').textContent='記録中';};
  recognition.onresult=(event)=>{
    let interim='';
    for(let i=event.resultIndex;i<event.results.length;i++){
      const t=event.results[i][0].transcript.trim();
      if(event.results[i].isFinal){ if(t)addLog(t); }
      else{ interim+=t; }
    }
    document.getElementById('live').textContent=interim||'認識中…';
  };
  recognition.onerror=(event)=>{document.getElementById('status').textContent='エラー: '+event.error;};
  recognition.onend=()=>{
    if(shouldContinue&&isRecording){try{recognition.start();}catch(e){}}
    else{document.getElementById('status').textContent='停止中';document.getElementById('live').textContent='停止中';}
  };
  try{recognition.start();}catch(e){document.getElementById('status').textContent='開始できませんでした';}
}
function stopRec(){
  shouldContinue=false;isRecording=false;
  if(recognition)recognition.stop();
  document.getElementById('status').textContent='停止中';
}
function buildText(){
  const title=document.getElementById('sessionName').value||defaultSessionName();
  let out=`${title}\n`;
  out+=`作成日時：${new Date().toLocaleString('ja-JP')}\n\n`;
  logs.forEach(r=>{out+=`${r.time}　${r.text}\n`;});
  return out;
}
function downloadText(){
  const blob=new Blob([buildText()],{type:'text/plain;charset=utf-8'});
  downloadBlob(blob,safeFileName(document.getElementById('sessionName').value)+'.txt');
}
function downloadCSV(){
  let csv='日付,時刻,内容\n';
  logs.forEach(r=>{csv+=`"${r.date}","${r.time}","${String(r.text).replace(/"/g,'""')}"\n`;});
  const bom='\ufeff';
  const blob=new Blob([bom+csv],{type:'text/csv;charset=utf-8'});
  downloadBlob(blob,safeFileName(document.getElementById('sessionName').value)+'.csv');
}
function downloadBlob(blob,filename){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
}
async function copyLogs(){
  try{await navigator.clipboard.writeText(buildText());alert('ログをコピーしました。');}
  catch(e){alert('コピーできませんでした。テキスト保存を使ってください。');}
}
function clearLog(){
  if(confirm('ログを全消去しますか？')){logs=[];saveState();renderLogs();}
}
</script>
</body>
</html>
