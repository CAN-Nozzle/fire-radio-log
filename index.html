<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>消防無線リアルタイムログ 試作版</title>
<style>
  body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif;background:#101418;color:#fff;margin:0;padding:14px;}
  header{position:sticky;top:0;background:#101418;padding-bottom:10px;border-bottom:1px solid #333;}
  h1{font-size:22px;margin:4px 0 10px;}
  button{font-size:18px;padding:12px 14px;margin:4px;border:0;border-radius:10px;font-weight:700;}
  .start{background:#e53935;color:#fff}.stop{background:#555;color:#fff}.save{background:#1976d2;color:#fff}.clear{background:#777;color:#fff}
  #status{font-size:18px;color:#ffd45a;margin:8px 0;}
  #live{font-size:18px;color:#b7e3ff;border:1px solid #31465a;border-radius:10px;padding:10px;margin-top:8px;min-height:28px;}
  .log{border-bottom:1px solid #3b3b3b;padding:12px 0;font-size:23px;line-height:1.45;}
  .time{display:inline-block;color:#8fd3ff;font-weight:800;margin-right:10px;min-width:92px;}
  .text{white-space:pre-wrap;}
  #search{width:100%;box-sizing:border-box;font-size:20px;padding:10px;border-radius:10px;border:1px solid #555;margin-top:8px;background:#1d2329;color:#fff;}
  small{color:#aaa;}
</style>
</head>
<body>
<header>
<h1>消防無線リアルタイムログ 試作版</h1>
<button class="start" onclick="startRec()">記録開始</button>
<button class="stop" onclick="stopRec()">停止</button>
<button class="save" onclick="downloadCSV()">CSV保存</button>
<button class="clear" onclick="clearLog()">全消去</button>
<div id="status">停止中</div>
<input id="search" placeholder="検索：CAN、現着、救助など" oninput="renderLogs()">
<div id="live">認識中の文字がここに出ます</div>
<small>※試作版。重要記録は必ず指令員が確認してください。</small>
</header>
<main id="logs"></main>
<script>
let recognition=null;
let logs=JSON.parse(localStorage.getItem('fireRadioLogs')||'[]');
let shouldContinue=false;

function nowTime(){
  const d=new Date();
  return d.toLocaleTimeString('ja-JP',{hour12:false});
}
function saveLocal(){localStorage.setItem('fireRadioLogs',JSON.stringify(logs));}
function normalizeFireWords(text){
  const rules=[
    [/げんちゃく/g,'現着'],[/ちんあつ/g,'鎮圧'],[/ちんか/g,'鎮火'],[/ようきゅうじょしゃ/g,'要救助者'],
    [/きゅうじょ/g,'救助'],[/ほうすい/g,'放水'],[/しょうぼうぐしかわ/g,'消防具志川'],
    [/ぐしかわぽんぷ/g,'具志川ポンプ'],[/きゃん/g,'CAN'],[/キャン/g,'CAN']
  ];
  let out=text;
  rules.forEach(([a,b])=>out=out.replace(a,b));
  return out;
}
function addLog(text){
  text=normalizeFireWords(text.trim());
  if(!text)return;
  logs.push({time:nowTime(),text:text});
  saveLocal();
  renderLogs();
}
function renderLogs(){
  const q=document.getElementById('search').value.trim();
  const area=document.getElementById('logs');
  area.innerHTML='';
  logs.slice().reverse().filter(r=>!q||r.text.includes(q)||r.time.includes(q)).forEach(r=>{
    const div=document.createElement('div');
    div.className='log';
    div.innerHTML='<span class="time">'+escapeHtml(r.time)+'</span><span class="text">'+escapeHtml(r.text)+'</span>';
    area.appendChild(div);
  });
}
function escapeHtml(s){return s.replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
function startRec(){
  const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SpeechRecognition){alert('このブラウザは音声認識に対応していません。ChromeまたはSafariで試してください。');return;}
  shouldContinue=true;
  recognition=new SpeechRecognition();
  recognition.lang='ja-JP';
  recognition.continuous=true;
  recognition.interimResults=true;
  recognition.onstart=()=>document.getElementById('status').textContent='記録中';
  recognition.onresult=(event)=>{
    let interim='';
    for(let i=event.resultIndex;i<event.results.length;i++){
      const t=event.results[i][0].transcript;
      if(event.results[i].isFinal){addLog(t);document.getElementById('live').textContent='';}
      else{interim+=t;document.getElementById('live').textContent=interim;}
    }
  };
  recognition.onerror=(event)=>{document.getElementById('status').textContent='エラー: '+event.error;};
  recognition.onend=()=>{
    if(shouldContinue){try{recognition.start();}catch(e){}}
    else{document.getElementById('status').textContent='停止中';}
  };
  recognition.start();
}
function stopRec(){shouldContinue=false;if(recognition)recognition.stop();document.getElementById('status').textContent='停止中';}
function downloadCSV(){
  let csv='時刻,内容\n';
  logs.forEach(r=>{csv+='"'+r.time+'","'+r.text.replace(/"/g,'""')+'"\n';});
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='消防無線ログ.csv';a.click();URL.revokeObjectURL(url);
}
function clearLog(){if(confirm('ログを全消去しますか？')){logs=[];saveLocal();renderLogs();}}
renderLogs();
</script>
</body>
</html>
