<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fire Radio Log Ver.3.3</title>
<style>
  :root{
    --bg:#0d1116;--panel:#141a20;--panel2:#0f151b;--line:#29343e;--text:#e8f1f6;--muted:#93a4b1;
    --accent:#65d8ff;--danger:#ff7373;--ok:#79e08e;--warn:#ffd166;--btn:#7ddcff;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;}
  header{display:flex;align-items:center;gap:7px;padding:6px 8px;border-bottom:1px solid var(--line);background:#0a0f14;position:sticky;top:0;z-index:2;flex-wrap:wrap;}
  h1{font-size:14px;margin:0 6px 0 0;white-space:nowrap}.ver{font-size:10px;color:var(--muted);font-weight:500}
  input,select{background:#080d12;border:1px solid var(--line);color:var(--text);border-radius:5px;padding:5px 6px;font-size:12px;}
  #caseName{min-width:210px;flex:1;max-width:360px}
  button{border:0;border-radius:6px;padding:6px 9px;font-weight:700;font-size:12px;color:#061014;background:var(--btn);cursor:pointer;white-space:nowrap;}
  button.stop{background:#ff8585} button.save{background:#b8e986} button.clear{background:#3b4650;color:#fff} button.mark{background:#ffd166}
  #status{font-size:12px;color:var(--warn);min-width:64px}.wrap{display:grid;grid-template-columns:1fr 240px;gap:6px;padding:6px;height:calc(100vh - 47px)}
  #logs{border:1px solid var(--line);background:var(--panel);border-radius:7px;overflow:auto;padding:4px;font-size:11px;line-height:1.12;}
  .row{display:grid;grid-template-columns:40px 1fr 24px;gap:5px;border-bottom:1px solid #22303a;padding:1px 3px;min-height:16px;align-items:start;touch-action:pan-y;transition:transform .12s ease, background .12s ease;}
  .row.swiping{background:#3a1515!important}.row.deleting{transform:translateX(-90px);background:#4a1010!important}
  .time{color:var(--accent);font-weight:800;font-variant-numeric:tabular-nums}.text{white-space:pre-wrap;word-break:break-word}.star{color:var(--warn);text-align:center;font-weight:900;cursor:pointer}.row.important{background:#302711}.row.urgent{background:#3a0505!important;border-bottom:1px solid #ff5555;font-size:14px;font-weight:900;min-height:22px}.row.urgent .time,.row.urgent .text,.row.urgent .star{color:#ff5b5b}.row.hit{outline:1px solid var(--warn)}
  .row:nth-child(odd){background-color:rgba(255,255,255,0.012)}
  aside{border:1px solid var(--line);background:var(--panel);border-radius:7px;padding:7px;overflow:auto;font-size:11px} aside h2{font-size:12px;margin:0 0 5px}.box{border-top:1px solid var(--line);padding-top:7px;margin-top:7px}.small{color:var(--muted);font-size:10.5px;line-height:1.35}.dict{font-size:10.5px;color:#c9d6df;line-height:1.45}.search{width:100%;margin:4px 0 6px}.preview{color:var(--muted);border:1px dashed var(--line);border-radius:6px;padding:5px;min-height:34px;background:var(--panel2)}
  .counter{color:var(--muted);font-size:10.5px;margin-top:5px}.modeLabel{font-size:10.5px;color:var(--muted)}
  @media(max-width:800px){.wrap{grid-template-columns:1fr;height:auto} aside{display:none} header{gap:5px} #logs{height:72vh;font-size:11px}.row{grid-template-columns:40px 1fr 24px} #caseName{min-width:160px}}
</style>
</head>
<body>
<header>
  <h1>🔥 Fire Radio Log <span class="ver">Ver.3.3 / 左スワイプ削除</span></h1>
  <input id="caseName" placeholder="案件名 例：大田建物火災" />
  <button onclick="startRec()">記録開始</button>
  <button class="stop" onclick="stopRec()">停止</button>
  <button class="mark" onclick="markLatest()">最新★</button>
  <button class="save" onclick="downloadCSV()">Excel用保存</button>
  <button class="save" onclick="downloadText()">テキスト保存</button>
  <button class="clear" onclick="newCase()">新規</button>
  <span id="status">停止中</span>
</header>
<div class="wrap">
  <main id="logs"></main>
  <aside>
    <h2>検索</h2>
    <input class="search" id="search" placeholder="CAN、救助、鎮圧など" oninput="renderLogs()" />
    <div class="small">検索語を含む行に枠が付きます。ログ行は左へスワイプすると確認後に削除できます。</div>
    <div class="box">
      <h2>表示</h2>
      <label class="modeLabel">行の段差</label>
      <select id="indentMode" onchange="renderLogs();saveLocal();">
        <option value="none">なし</option>
        <option value="light" selected>軽く斜め</option>
        <option value="wave">折り返し斜め</option>
      </select>
      <div class="counter" id="counter">0行</div>
    </div>
    <div class="box">
      <h2>認識中</h2>
      <div id="preview" class="preview">ここに途中認識が表示されます</div>
    </div>
    <div class="box">
      <h2>消防用語辞書 Ver.3</h2>
      <div class="dict" id="dictList"></div>
    </div>
    <div class="box small">
      Excel用保存は、時刻・内容・重要・斜め表示の列で出力します。時刻は分までです。右端の☆は重要マークです。
    </div>
  </aside>
</div>
<script>
let recognition=null;
let logs=[];
let running=false;
const dict=[
  ["せんたーおきなわ","センター沖縄"],["センターおきなわ","センター沖縄"],["センター沖縄","センター沖縄"],
  ["しょうぼうへんざ","消防平安座"],["消防へんざ","消防平安座"],["消防ヘンザ","消防平安座"],["ショウボウヘンザ","消防平安座"],
  ["ぐしかわ救急いち","具志川救急1"],["具志川救急一","具志川救急1"],["具志川救急市","具志川救急1"],["具志川救急1ワーク隊","具志川救急1ワーク隊"],["具志川救急一ワーク隊","具志川救急1ワーク隊"],
  ["ぐしかわ救急に","具志川救急2"],["具志川救急二","具志川救急2"],["具志川救急2ワーク隊","具志川救急2ワーク隊"],["具志川救急二ワーク隊","具志川救急2ワーク隊"],
  ["ぐしかわ救急さん","具志川救急3"],["具志川救急三","具志川救急3"],["具志川救急3ワーク隊","具志川救急3ワーク隊"],["具志川救急三ワーク隊","具志川救急3ワーク隊"],
  ["げんじょうほうこく","現状報告"],["現状ほうこく","現状報告"],["じょうきょうほうこく","状況報告"],["状況ほうこく","状況報告"],
  ["ぞうたいようせい","増隊要請"],["増隊ようせい","増隊要請"],["おうえんようせい","応援要請"],["応援ようせい","応援要請"],
  ["ドクターカーようせい","ドクターカー要請"],["どくたーかーようせい","ドクターカー要請"],["ドクターヘリようせい","ドクターヘリ要請"],["どくたーへりようせい","ドクターヘリ要請"],
  ["しきゅうしきゅう","至急、至急"],["至急至急","至急、至急"],["しきゅう、しきゅう","至急、至急"],
  ["ぐしかわポンプいち","具志川ポンプ1"],["具志川ポンプ市","具志川ポンプ1"],["具志川ポンプ一","具志川ポンプ1"],["具志川 ポンプ 1","具志川ポンプ1"],
  ["ぐしかわポンプに","具志川ポンプ2"],["具志川ポンプ二","具志川ポンプ2"],
  ["いしかわポンプいち","石川ポンプ1"],["石川ポンプ一","石川ポンプ1"],
  ["よかつポンプいち","与勝ポンプ1"],["与勝ポンプ一","与勝ポンプ1"],
  ["具志川救助","具志川救助"],["ぐしかわ救助","具志川救助"],["よかつ救助","与勝救助"],
  ["消防串川","消防具志川"],["消防具志がわ","消防具志川"],["しょうぼうぐしかわ","消防具志川"],
  ["消防石川","消防石川"],["しょうぼういしかわ","消防石川"],["消防与勝","消防与勝"],["しょうぼうよかつ","消防与勝"],
  ["げんちゃく","現着"],["げんちゃく報告","現着報告"],["げんばとうちゃく","現場到着"],
  ["ちんあつ","鎮圧"],["ちんか","鎮火"],["えんしょう","延焼"],["えんしょう中","延焼中"],
  ["かなのずる","CANノズル"],["キャンノズル","CANノズル"],["CAN ノズル","CANノズル"],["キャン投入","CAN投入"],
  ["ようきゅうじょしゃ","要救助者"],["よう救助者","要救助者"],["にげおくれ","逃げ遅れ"],["逃げ遅れ者","逃げ遅れ"],
  ["ほうすいかいし","放水開始"],["放水かいし","放水開始"],["おくないしんにゅう","屋内進入"],["屋内しんにゅう","屋内進入"],
  ["けんさくかいし","検索開始"],["検索かいし","検索開始"],["すいりぶしょ","水利部署"],["ほうすいたいけい","放水体形"],
  ["はしごしゃ","はしご車"],["はしご車","はしご車"],["ばすけっと救助","バスケット救助"],
  ["人員よんめい","人員4名"],["人員さんめい","人員3名"],["人員ごめい","人員5名"],
  ["大田建物火災現状","大田建物火災現場"],["出動ほうこく","出動報告"],["しゅつどうほうこく","出動報告"],
  ["たいひしじ","退避指示"],["たいひめいれい","退避命令"],["しきたい","指揮隊"],["しょうたいちょう","小隊長"],["ちゅうたいちょう","中隊長"]
];
function nowMin(){const d=new Date();return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function sanitizeFileName(s){return (s||'無線ログ').replace(/[\\/:*?"<>|]/g,'_').trim()||'無線ログ';}
function correctText(text){let t=text; dict.forEach(([a,b])=>{t=t.replaceAll(a,b)}); return t.replace(/\s+/g,' ').trim();}
function addLog(text){const fixed=correctText(text); if(!fixed)return; logs.push({time:nowMin(),text:fixed,important:isImportant(fixed),urgent:isUrgent(fixed)}); renderLogs(true); saveLocal();}
function isImportant(t){return /(至急|要救助者|逃げ遅れ|退避|救助|鎮圧|鎮火|延焼|CAN|現着|放水開始|増隊要請|応援要請|ドクターカー要請|ドクターヘリ要請)/.test(t);}
function isUrgent(t){return /(至急)/.test(t);}
function indentStyle(i){const mode=document.getElementById('indentMode').value; if(mode==='none')return ''; let n=0; if(mode==='light')n=Math.min(i%6,5)*8; if(mode==='wave')n=(i%12)*7; return 'padding-left:'+n+'px';}
function renderLogs(scrollBottom=false){const q=document.getElementById('search').value.trim(); const el=document.getElementById('logs'); el.innerHTML=''; logs.forEach((r,i)=>{const div=document.createElement('div'); div.className='row'+(r.important?' important':'')+((r.urgent||isUrgent(r.text))?' urgent':'')+(q&&r.text.includes(q)?' hit':''); div.setAttribute('style',indentStyle(i)); div.dataset.index=i; div.innerHTML=`<div class="time">${r.time}</div><div class="text">${escapeHtml(r.text)}</div><div class="star" title="重要マーク" onclick="toggleImportant(${i});event.stopPropagation();">${r.important?'★':'☆'}</div>`; attachSwipeDelete(div,i); el.appendChild(div);}); document.getElementById('counter').textContent=logs.length+'行'; if(scrollBottom) el.scrollTop=el.scrollHeight;}
function escapeHtml(s){return s.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function attachSwipeDelete(el,i){
  let startX=0,startY=0,dx=0,active=false;
  el.addEventListener('touchstart',e=>{if(!e.touches[0])return; startX=e.touches[0].clientX; startY=e.touches[0].clientY; dx=0; active=true;}, {passive:true});
  el.addEventListener('touchmove',e=>{if(!active||!e.touches[0])return; dx=e.touches[0].clientX-startX; const dy=e.touches[0].clientY-startY; if(Math.abs(dx)>Math.abs(dy)&&dx<0){el.classList.add('swiping'); el.style.transform='translateX('+Math.max(dx,-95)+'px)';}}, {passive:true});
  el.addEventListener('touchend',()=>{if(!active)return; active=false; el.classList.remove('swiping'); if(dx<-70){el.classList.add('deleting'); setTimeout(()=>deleteLog(i),80);} else {el.style.transform='';}}, {passive:true});
}
function deleteLog(i){
  const r=logs[i];
  if(!r){renderLogs();return;}
  if(confirm('このログを削除しますか？\n\n'+r.time+'　'+r.text)){
    logs.splice(i,1);
    saveLocal();
  }
  renderLogs();
}

function startRec(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition; if(!SR){alert('このブラウザは音声認識に対応していません。SafariまたはChromeで試してください。');return;} if(running)return; recognition=new SR(); recognition.lang='ja-JP'; recognition.continuous=true; recognition.interimResults=true; running=true; document.getElementById('status').textContent='記録中'; recognition.onresult=e=>{let interim=''; for(let i=e.resultIndex;i<e.results.length;i++){const txt=e.results[i][0].transcript.trim(); if(e.results[i].isFinal){addLog(txt); interim='';} else {interim+=txt;}} document.getElementById('preview').textContent=correctText(interim)||'ここに途中認識が表示されます';}; recognition.onerror=e=>{document.getElementById('status').textContent='エラー:'+e.error;}; recognition.onend=()=>{if(running){try{recognition.start();}catch(e){}}else{document.getElementById('status').textContent='停止中';}}; recognition.start();}
function stopRec(){running=false; if(recognition)recognition.stop(); document.getElementById('status').textContent='停止中';}
function toggleImportant(i){logs[i].important=!logs[i].important; renderLogs(); saveLocal();}
function markLatest(){if(logs.length){logs[logs.length-1].important=true; renderLogs(true); saveLocal();}}
function newCase(){if(logs.length&&!confirm('現在のログを消して新しい記録を開始しますか？先に保存してください。'))return; logs=[]; document.getElementById('caseName').value=''; renderLogs(); saveLocal();}
function downloadCSV(){const name=sanitizeFileName(document.getElementById('caseName').value); let csv='案件名,'+csvCell(name)+'\n時刻,内容,重要,斜め表示\n'; logs.forEach((r,i)=>{const indent=' '.repeat(i%24); csv+=`${csvCell(r.time)},${csvCell(r.text)},${r.important?'★':''},${csvCell(indent+r.time+' '+r.text)}\n`;}); download(name+'_Excel用.csv',csv,'text/csv;charset=utf-8;');}
function downloadText(){const name=sanitizeFileName(document.getElementById('caseName').value); let txt='【'+name+'】\n'; logs.forEach(r=>txt+=`${r.important?'★ ':''}${r.time}　${r.text}\n`); download(name+'_無線ログ.txt',txt,'text/plain;charset=utf-8;');}
function csvCell(s){return '"'+String(s).replace(/"/g,'""')+'"';}
function download(file,content,type){const blob=new Blob([content],{type}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=file; a.click(); URL.revokeObjectURL(url);}
function saveLocal(){localStorage.setItem('frl_v33_logs',JSON.stringify(logs)); localStorage.setItem('frl_v33_case',document.getElementById('caseName').value); localStorage.setItem('frl_v33_indent',document.getElementById('indentMode').value);}
function loadLocal(){try{logs=JSON.parse(localStorage.getItem('frl_v33_logs')||localStorage.getItem('frl_v32_logs')||'[]'); document.getElementById('caseName').value=localStorage.getItem('frl_v33_case')||localStorage.getItem('frl_v32_case')||''; document.getElementById('indentMode').value=localStorage.getItem('frl_v33_indent')||localStorage.getItem('frl_v32_indent')||'light';}catch(e){logs=[]} renderLogs(true);}
document.getElementById('caseName').addEventListener('input',saveLocal);
document.getElementById('dictList').innerHTML=dict.slice(0,70).map(x=>x[0]+' → '+x[1]).join('<br>');
loadLocal();
</script>
</body>
</html>
